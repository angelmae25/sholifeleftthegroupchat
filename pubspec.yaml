name: scholife_mobileapp
description: Scholife - School Community App (MVC Architecture)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  provider: ^6.1.1
  go_router: ^13.0.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  smooth_page_indicator: ^1.1.0
  badges: ^3.1.2
  shimmer: ^3.0.0
  http: ^1.2.1

  # ── SQLite local cache (offline support) ──────────────────────────────────
  sqflite: ^2.3.2
  path: ^1.9.0

  # ── Image picker (gallery / camera) ───────────────────────────────────────
  image_picker: ^1.1.2

  # ── Real-time chat via Socket.IO ──────────────────────────────────────────
  socket_io_client: ^2.0.3+1

  # ── Firebase push notifications ───────────────────────────────────────────
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo_icon.png
    - assets/images/logo_wordmark.png
    - assets/images/splash_logo.png
    - assets/images/auth_bg.jpg